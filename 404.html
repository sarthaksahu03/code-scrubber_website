<html lang="en">
<head>

  <style>
    .not-found {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      justify-content: center;
      padding: 80px 40px;
      min-height: calc(100vh - 52px - 61px);
      max-width: 520px;
    }
    .not-found .code { font-size: 11px; color: var(--ink3); letter-spacing: 0.14em; text-transform: uppercase; margin-bottom: 20px; }
    .not-found h1 { font-family: var(--serif); font-size: 64px; font-weight: 700; line-height: 1.0; color: var(--ink); margin-bottom: 20px; }
    .not-found p  { font-size: 16px; color: var(--ink2); line-height: 1.7; margin-bottom: 32px; font-family: var(--serif); }
  </style>
</head>
<body>

  <nav>
    <div class="nav-inner">
    <a class="nav-logo" href="index.html"><span class="logo-slash">// </span>code-scrubber</a>
    <div class="nav-right">
      <div class="nav-links">
        <a class="nav-link" href="index.html">home</a>
        <a class="nav-link" href="docs.html">docs</a>
        <a class="nav-link" href="blog.html">blog</a>
        <a class="nav-link" href="https://github.com/twilight0963/code-scrubber" target="_blank">github ↗</a>
      </div>
      <button class="theme-btn" id="theme-btn">
        <span id="theme-icon">☀</span>
        <span id="theme-label">light</span>
      </button>
    </div>
      </div>
  </nav>

  <div class="not-found">
    <div class="code">// error 404</div>
    <h1>Page<br>not found.</h1>
    <p>This page doesn't exist or has been moved.<br>No credentials were harmed.</p>
    <a class="btn-dark" href="index.html">← Back to home</a>

  <footer>
    <p>// built by humans, for humans</p>
    <div class="f-links">
      <a href="https://github.com/twilight0963/code-scrubber" target="_blank">GitHub</a>
      <a href="#">Donate</a>
      <a href="docs.html">Docs</a>

  </footer>

  <script src="assets/js/theme.js" defer></script>

</html>
